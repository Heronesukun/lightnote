name: lightnote
description: "A simple, local-first记账应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  go_router: ^14.8.1
  intl: ^0.19.0
  fl_chart: ^0.69.2
  share_plus: ^10.1.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
